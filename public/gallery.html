<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Галерея работ мастеров студии INDIAL. Стрижки, окрашивания, макияж и укладки в Перми. Фотографии наших гостей.">
  <title>Галерея — INDIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css?v=20260706-8">
  <style>

    /* ══════════════════════════════════════════════
       GALLERY PAGE — Bento/Editorial Layout
       ══════════════════════════════════════════════ */
    .gallery-section {
      padding: 2.5rem 2rem 8rem;
    }

    @media (min-width: 1400px) {
      .gallery-section { padding-left: calc((100vw - 1280px) / 2); padding-right: calc((100vw - 1280px) / 2); }
    }

    @media (max-width: 768px) {
      .gallery-section { padding-left: 0.75rem; padding-right: 0.75rem; }
    }

    @media (max-width: 420px) {
      .gallery-section { padding-left: 0.5rem; padding-right: 0.5rem; }
    }

    /* ── Bento grid – fixed row units for perfect alignment ── */
    .gallery-bento {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(3, 1fr);
      /* Fixed row unit: span-2 cell = 260+6+260 = 526px, matches two stacked cells */
      grid-auto-rows: 260px;
      grid-auto-flow: dense;
    }

    /* Every cell is a positioned container */
    .bento-cell {
      position: relative;
      overflow: hidden;
      background: var(--off-white);
      cursor: zoom-in;
    }

    /* Row heights via grid-row spans */
    .bento-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s;
      filter: grayscale(15%);
    }

    .bento-cell:hover img {
      transform: scale(1.04);
      filter: grayscale(0%);
    }

    /* Hover overlay with description */
    .bento-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.7) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
      pointer-events: none;
    }

    .bento-cell:hover .bento-overlay {
      opacity: 1;
    }

    .bento-overlay-category {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 0.3rem;
    }

    .bento-overlay-title {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--white);
      line-height: 1.25;
    }

    /* Zoom icon on hover */
    .bento-cell::after {
      content: '⊕';
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.4rem;
      color: rgba(255,255,255,0);
      transition: color 0.35s;
      pointer-events: none;
      font-family: sans-serif;
      line-height: 1;
    }

    .bento-cell:hover::after {
      color: rgba(255,255,255,0.75);
    }

    /* ─── Layout Patterns ────────────────────────────────
       All heights derived from grid-auto-rows: 260px unit.
       span 2 = 260 + 6 (gap) + 260 = 526px  ← perfect match
       span 2 cols = 2 × col-width + 6px gap  ← perfect match
    ─────────────────────────────────────────────────────── */

    /* Row A col-1: spans 2 rows (height = 526px) */
    .bento-cell[data-pos="a1"] {
      grid-row: span 2;
    }
    /* Row A col-2 & col-3: 1 row each (height = 260px) — auto, no overrides needed */

    /* Row B col-1: spans 2 columns (width = 2/3 + gap) */
    .bento-cell[data-pos="b1"] {
      grid-column: span 2;
    }
    /* Row B col-2: 1 col, 1 row — auto */

    /* Row C: 3 equal cells — auto, no overrides needed */

    /* Extra cells beyond 9: auto 3-col, 1 row — auto */

    /* ── Lightbox ── */
    .gallery-lightbox {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(10, 10, 10, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 2rem;
    }

    .gallery-lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .gallery-lightbox img {
      max-width: min(90vw, 900px);
      max-height: 88vh;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.07);
      transform: scale(0.96);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .gallery-lightbox.open img {
      transform: scale(1);
    }

    .lightbox-meta {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .lightbox-meta-category {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.3rem;
    }

    .lightbox-meta-title {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.25s;
    }

    .lightbox-nav:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }

    .lightbox-nav.prev { left: 2rem; }
    .lightbox-nav.next { right: 2rem; }

    .gallery-lightbox-close {
      position: absolute;
      top: 1.75rem;
      right: 1.75rem;
      color: rgba(255,255,255,0.6);
      font-size: 1.3rem;
      cursor: pointer;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      transition: all 0.25s;
    }

    .gallery-lightbox-close:hover {
      background: var(--white);
      color: var(--black);
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .gallery-bento {
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        grid-auto-rows: 200px;
      }
      .bento-cell[data-pos] {
        grid-column: auto !important;
        grid-row: auto !important;
      }
      .bento-cell:first-child {
        grid-column: span 2;
        grid-row: span 2;
      }
    }

    @media (max-width: 768px) {
      .gallery-bento {
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        grid-auto-rows: 180px;
      }
      /* Reset all special spans — 2-col uniform grid */
      .bento-cell[data-pos] {
        grid-column: auto !important;
        grid-row: auto !important;
      }
      /* First cell stays wide across both columns */
      .bento-cell:first-child {
        grid-column: span 2;
        grid-row: span 2;
      }
      .gallery-lightbox { padding: 0.75rem; }
      .lightbox-nav { display: none; }
      .lightbox-meta { bottom: 1rem; }
    }

    @media (max-width: 420px) {
      .gallery-bento {
        grid-template-columns: 1fr;
        grid-auto-rows: 220px;
      }
      .bento-cell:first-child {
        grid-column: 1;
        grid-row: span 2;
      }
    }

  </style>
</head>
<body>

  <header class="site-header" id="site-header"></header>
  <div class="mobile-nav" id="mobile-nav"></div>

  <main class="page-content">

    <!-- ══ PAGE HERO ══ -->
    <section class="page-hero">
      <div class="container page-hero-inner">
        <p class="page-hero-label">Портфолио гостей студии</p>
        <h1 class="page-hero-title">Галерея</h1>
      </div>
    </section>

    <!-- ══ GALLERY BENTO ══ -->
    <section class="gallery-section">
      <div class="gallery-bento" id="photos-layout">
        <!-- Populated by JS -->
      </div>
    </section>

  </main>

  <!-- ══ LIGHTBOX ══ -->
  <div class="gallery-lightbox" id="gallery-lightbox">
    <span class="gallery-lightbox-close" id="lightbox-close-btn">&times;</span>
    <button class="lightbox-nav prev" id="lightbox-prev">&#8592;</button>
    <button class="lightbox-nav next" id="lightbox-next">&#8594;</button>
    <img id="lightbox-img" src="" alt="Full view">
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/shared.js?v=20260706-8"></script>
  <script>
    (async () => {
      const container = document.getElementById('photos-layout');
      const lightbox = document.getElementById('gallery-lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close-btn');
      const lightboxPrev = document.getElementById('lightbox-prev');
      const lightboxNext = document.getElementById('lightbox-next');


      let galleryItems = [];
      let currentIndex = 0;

      // Bento position pattern repeating for every 9 items
      const positionPattern = ['a1','a2','a3','b1','b2','c1','c2','c3','extra'];

      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        galleryItems = data.gallery || [];
      } catch (err) {
        console.error('Error fetching gallery data:', err);
      }

      if (!galleryItems.length) {
        container.innerHTML = '<p style="padding:4rem;text-align:center;color:#6B6B6B;font-size:0.9rem;">Галерея пока пуста.</p>';
        return;
      }

      const categoryLabels = {
        'hair': 'Стрижки & Окрашивания',
        'makeup': 'Профессиональный макияж',
        'care': 'Уходовые процедуры',
        'nails': 'Ногтевой сервис'
      };

      const getImageSrc = (value = '') => {
        const src = String(value);
        return src.startsWith('http') || src.startsWith('/') ? src : `/img/${src}`;
      };

      function renderGallery() {
        container.innerHTML = '';
        galleryItems.forEach((photo, index) => {
          const pos = positionPattern[index % positionPattern.length];

          const cell = document.createElement('div');
          cell.className = 'bento-cell';
          cell.setAttribute('data-pos', pos);
          cell.setAttribute('data-index', index);

          const catLabel = categoryLabels[photo.category] || 'Студия INDIAL';

          cell.innerHTML = `
            <img
              src="${getImageSrc(photo.filename)}"
              alt="${photo.description || 'Работа студии INDIAL'}"
              loading="lazy"
              decoding="async"
              onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'400\\' height=\\'500\\'><rect fill=\\'%23E8E8E8\\' width=\\'100%\\' height=\\'100%\\'/></svg>'"
            >
          `;

          cell.addEventListener('click', () => openLightbox(index));
          container.appendChild(cell);
        });
      }

      // ── Lightbox ──
      function openLightbox(index) {
        currentIndex = index;
        showPhoto(index);
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      function showPhoto(index) {
        const photo = galleryItems[index];
        if (!photo) return;
        lightboxImg.src = getImageSrc(photo.filename);
        lightboxImg.alt = photo.description || 'Работа студии INDIAL';
        currentIndex = index;
      }

      function prevPhoto() {
        const newIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
        showPhoto(newIndex);
      }

      function nextPhoto() {
        const newIndex = (currentIndex + 1) % galleryItems.length;
        showPhoto(newIndex);
      }

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevPhoto();
        if (e.key === 'ArrowRight') nextPhoto();
      });

      // Touch swipe for lightbox
      let touchStartX = 0;
      lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
      lightbox.addEventListener('touchend', (e) => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) nextPhoto(); else prevPhoto();
        }
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxPrev.addEventListener('click', prevPhoto);
      lightboxNext.addEventListener('click', nextPhoto);
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
      });

      renderGallery();

    })();
  </script>
</body>
</html>
